version: 1.1
comment: "Revenue and discount metrics by shipping mode"
source: samples.tpch.lineitem
fields:
  - name: ship_mode
    expr: l_shipmode
    display_name: "Ship Mode"
    synonyms: ["shipping mode", "delivery method", "carrier"]
measures:
  - name: line_count
    expr: COUNT(*)
    display_name: "Line Count"
    synonyms: ["number of line items"]
  - name: gross_revenue
    expr: SUM(l_extendedprice)
    display_name: "Gross Revenue"
    synonyms: ["extended price", "gross sales"]
  - name: net_revenue
    expr: SUM(l_extendedprice * (1 - l_discount))
    display_name: "Net Revenue"
    synonyms: ["revenue after discount", "discounted revenue"]
  - name: net_revenue_with_tax
    expr: SUM(l_extendedprice * (1 - l_discount) * (1 + l_tax))
    display_name: "Net Revenue with Tax"
    synonyms: ["taxed revenue", "after-tax revenue"]
  - name: avg_discount
    expr: AVG(l_discount)
    display_name: "Avg Discount"
    synonyms: ["average discount", "mean discount", "discount rate"]
  - name: avg_quantity
    expr: AVG(l_quantity)
    display_name: "Avg Quantity"
    synonyms: ["average quantity", "mean quantity"]
