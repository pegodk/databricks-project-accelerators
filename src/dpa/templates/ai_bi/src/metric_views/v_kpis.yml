version: 1.1
comment: "Single-row summary of overall business KPIs"
source: samples.tpch.orders
measures:
  - name: total_orders
    expr: COUNT(*)
    display_name: "Total Orders"
    synonyms: ["order count", "number of orders"]
  - name: total_revenue
    expr: SUM(o_totalprice)
    display_name: "Total Revenue"
    synonyms: ["revenue", "total sales", "gross revenue"]
  - name: avg_order_value
    expr: AVG(o_totalprice)
    display_name: "Avg Order Value"
    synonyms: ["AOV", "average order value", "average order"]
  - name: unique_customers
    expr: COUNT(DISTINCT o_custkey)
    display_name: "Unique Customers"
    synonyms: ["customer count", "distinct customers"]
