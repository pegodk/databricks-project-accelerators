version: 1.1
comment: "Revenue breakdown by customer market segment"
source: samples.tpch.orders
joins:
  - name: customer
    source: samples.tpch.customer
    on: source.o_custkey = customer.c_custkey
    rely:
      at_most_one_match: true
fields:
  - name: market_segment
    expr: customer.c_mktsegment
    display_name: "Market Segment"
    synonyms: ["segment", "customer segment"]
measures:
  - name: total_revenue
    expr: SUM(o_totalprice)
    display_name: "Total Revenue"
    synonyms: ["revenue", "sales"]
  - name: order_count
    expr: COUNT(o_orderkey)
    display_name: "Order Count"
    synonyms: ["number of orders"]
  - name: avg_order_value
    expr: AVG(o_totalprice)
    display_name: "Avg Order Value"
    synonyms: ["AOV", "average order"]
