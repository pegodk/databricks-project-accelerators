version: 1.1
comment: "Revenue breakdown by geographic region and nation"
source: samples.tpch.orders
joins:
  - name: customer
    source: samples.tpch.customer
    on: source.o_custkey = customer.c_custkey
    rely:
      at_most_one_match: true
    joins:
      - name: nation
        source: samples.tpch.nation
        on: customer.c_nationkey = nation.n_nationkey
        rely:
          at_most_one_match: true
        joins:
          - name: region
            source: samples.tpch.region
            on: nation.n_regionkey = region.r_regionkey
            rely:
              at_most_one_match: true
fields:
  - name: region
    expr: customer.nation.region.r_name
    display_name: "Region"
    synonyms: ["geographic region", "sales region"]
  - name: nation
    expr: customer.nation.n_name
    display_name: "Nation"
    synonyms: ["country"]
measures:
  - name: total_revenue
    expr: SUM(o_totalprice)
    display_name: "Total Revenue"
    synonyms: ["revenue", "sales"]
  - name: order_count
    expr: COUNT(o_orderkey)
    display_name: "Order Count"
    synonyms: ["number of orders"]
