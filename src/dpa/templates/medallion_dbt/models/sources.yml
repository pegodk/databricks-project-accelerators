version: 2

sources:
  - name: tpch
    database: samples
    schema: tpch
    description: TPCH sample data bundled with every Databricks workspace
    tables:
      - name: orders
        description: Customer orders
      - name: lineitem
        description: Line items for each order
      - name: customer
        description: Customer master data
      - name: nation
        description: Nation reference data
      - name: region
        description: Region reference data
      - name: part
        description: Part catalogue
      - name: supplier
        description: Supplier master data
      - name: partsupp
        description: Part-supplier cost and availability
