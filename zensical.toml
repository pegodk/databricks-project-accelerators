[project]
site_name = "Databricks Project Accelerators"
site_description = "CLI to scaffold production-ready Databricks solutions via Jinja2 templates and Databricks Asset Bundles."
repo_name = "pegodk/databricks-project-accelerators"

copyright = """
Copyright &copy; 2025 Twoday
"""

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Accelerators" = [
    { "Medallion SDP" = "accelerators/medallion-sdp.md" },
  ]},
  { "API Reference" = [
    { "Accelerators" = "api/accelerators.md" },
    { "Deploy" = "api/deploy.md" },
  ]},
]

[project.theme]
language = "en"

features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "deep orange"
accent = "orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "deep orange"
accent = "orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
