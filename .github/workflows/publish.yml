name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi  # configure trusted publishing here in GitHub settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: |
          uv pip install --system hatchling
          python -m hatchling build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Set up at: https://pypi.org/manage/project/databricks-project-accelerators/settings/publishing/
