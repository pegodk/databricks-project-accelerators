site_name: Databricks Project Accelerators
site_description: CLI to scaffold Databricks solutions for industry use cases
site_url: https://pegodk.github.io/databricks-project-accelerators/
repo_url: https://github.com/pegodk/databricks-project-accelerators
repo_name: pegodk/databricks-project-accelerators

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Accelerators:
      - Medallion SDP: accelerators/medallion-sdp.md
  - API Reference:
      - Accelerators: api/accelerators.md
      - Deploy: api/deploy.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
